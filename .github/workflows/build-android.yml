name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev python3-pip
    - name: Install Buildozer
      run: |
        pip3 install cython==0.29.33
        pip3 install buildozer
    - name: Build APK
      run: buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lights-out-apk
        path: bin/*.apk
