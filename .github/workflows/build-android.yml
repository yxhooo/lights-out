name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev build-essential openjdk-11-jdk-headless

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install Cython==0.29.19 buildozer==1.5.0

    - name: Write buildozer.spec
      run: |
        printf '%s\n' \
          '[app]' \
          "title = Lights Out" \
          "package.name = lightsout" \
          "package.domain = org.example" \
          "source.dir = ." \
          "source.include_exts = py,png,jpg,kv,json" \
          "version = 0.1" \
          "version.code = 1" \
          "requirements = python3,kivy" \
          "icon.filename = %(source.dir)s/icon.png" \
          "presplash.filename = %(source.dir)s/presplash.png" \
          "orientation = portrait" \
          "android.api = 33" \
          "android.minapi = 21" \
          "android.ndk = 25c" \
          "fullscreen = 0" \
          '[buildozer]' \
          "log_level = 2" \
          > buildozer.spec

    - name: Build APK
      run: yes | buildozer android debug
      timeout-minutes: 90

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lights-out-apk
        path: bin/*.apk
        retention-days: 30
