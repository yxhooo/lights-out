name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf libtool pkg-config \
          zlib1g-dev cmake libffi-dev libssl-dev \
          build-essential openjdk-11-jdk-headless wget

    - name: Download Android command-line tools
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest

    - name: Install Android SDK + NDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

    - name: Verify aidl exists
      run: |
        $HOME/android-sdk/build-tools/33.0.2/aidl --version

    - name: Install Buildozer
      run: |
        pip install Cython==0.29.19 buildozer==1.4.0

    - name: Build APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $HOME/.buildozer/android/platform
        ln -sfT $HOME/android-sdk $HOME/.buildozer/android/platform/android-sdk
        yes | buildozer android debug
      timeout-minutes: 90

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lights-out-apk
        path: bin/*.apk
        retention-days: 30
